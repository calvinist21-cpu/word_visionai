<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등 중등 영단어</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bagel+Fat+One&family=Jua&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Jua',sans-serif;overflow:hidden;height:100vh;width:100vw;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
        .sky-layer{position:fixed;inset:0;z-index:0;overflow:hidden}
        .star{position:absolute;background:#fff;animation:twinkle var(--dur) ease-in-out infinite alternate}
        @keyframes twinkle{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}
        .ground{position:fixed;bottom:0;left:0;right:0;height:180px;z-index:1}
        .ground-grass{position:absolute;top:0;left:0;right:0;height:30px;background:repeating-linear-gradient(90deg,#4CAF50 0px,#4CAF50 40px,#43A047 40px,#43A047 80px);border-top:4px solid #66BB6A}
        .ground-dirt{position:absolute;top:30px;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,#8D6E63 0px,#8D6E63 40px,#795548 40px,#795548 80px)}
        .tree{position:fixed;bottom:150px;z-index:2}
        .tree-trunk{width:24px;height:50px;background:#6D4C41;margin:0 auto;border:2px solid #5D4037}
        .tree-top{width:64px;height:64px;background:#388E3C;border:3px solid #2E7D32;margin:0 auto;position:relative}
        .tree-top::before{content:'';position:absolute;top:-48px;left:50%;transform:translateX(-50%);width:48px;height:48px;background:#43A047;border:3px solid #388E3C}
        .tree-top::after{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:32px;height:32px;background:#4CAF50;border:3px solid #43A047}
        .tree:nth-child(1){left:5%}.tree:nth-child(2){right:8%;transform:scale(.8);bottom:148px}.tree:nth-child(3){left:15%;transform:scale(.6);bottom:146px}.tree:nth-child(4){right:20%;transform:scale(.9);bottom:149px}
        .roblox-char{position:fixed;bottom:170px;z-index:3;animation:charBounce 2s ease-in-out infinite}
        .char-head{width:32px;height:32px;background:#FFCC80;border:2px solid #FFB74D;margin:0 auto;position:relative}
        .char-head::before{content:'';position:absolute;top:8px;left:6px;width:5px;height:5px;background:#333;box-shadow:13px 0 0 #333}
        .char-head::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:10px;height:3px;background:#E57373}
        .char-body{width:28px;height:24px;margin:0 auto;border:2px solid rgba(0,0,0,.2)}
        .char-legs{display:flex;justify-content:center;gap:2px}
        .char-leg{width:12px;height:20px;background:#1565C0;border:2px solid #0D47A1}
        @keyframes charBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .roblox-char:nth-child(1){left:30%}.roblox-char:nth-child(1) .char-body{background:#E8423F}
        .roblox-char:nth-child(2){right:28%;animation-delay:-.8s}.roblox-char:nth-child(2) .char-body{background:#00A2FF}
        .moon{position:fixed;top:60px;right:10%;width:70px;height:70px;background:radial-gradient(circle at 35% 35%,#FFF9C4,#FFF176,#FFD54F);border-radius:50%;box-shadow:0 0 40px rgba(255,241,118,.4),0 0 80px rgba(255,241,118,.2);z-index:1;animation:moonGlow 4s ease-in-out infinite alternate}
        @keyframes moonGlow{0%{box-shadow:0 0 40px rgba(255,241,118,.4),0 0 80px rgba(255,241,118,.2)}100%{box-shadow:0 0 60px rgba(255,241,118,.6),0 0 120px rgba(255,241,118,.3)}}
        .moon-crater{position:absolute;background:rgba(0,0,0,.07);border-radius:50%}
        .particle{position:fixed;z-index:1;opacity:.5;animation:floatUp var(--p-dur) linear infinite;font-size:var(--p-size,20px)}
        @keyframes floatUp{0%{transform:translateY(100vh) rotate(0);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}
        .main-container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px}
        .title-wrap{text-align:center;margin-bottom:12px;animation:dropIn .8s cubic-bezier(.34,1.56,.64,1) both}
        @keyframes dropIn{0%{opacity:0;transform:translateY(-80px) scale(.5)}100%{opacity:1;transform:translateY(0) scale(1)}}
        .title-badge{display:inline-block;background:#F5C542;color:#232527;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;padding:4px 16px;border-radius:20px;margin-bottom:12px;letter-spacing:2px;text-transform:uppercase;border:3px solid rgba(0,0,0,.15);box-shadow:0 4px 0 #D4A636}
        .main-title{font-family:'Bagel Fat One',cursive;font-size:clamp(42px,8vw,80px);color:#fff;text-shadow:0 0 10px rgba(0,162,255,.5),0 4px 0 #0078BF,0 8px 0 #005A8F,0 12px 20px rgba(0,0,0,.4);line-height:1.2;margin-bottom:8px}
        .sub-title{font-family:'Jua',sans-serif;font-size:clamp(14px,3vw,20px);color:rgba(255,255,255,.7);letter-spacing:2px}
        .cards-container{display:flex;gap:28px;margin-top:24px;flex-wrap:wrap;justify-content:center;animation:cardsSlide 1s cubic-bezier(.34,1.56,.64,1) .3s both}
        @keyframes cardsSlide{0%{opacity:0;transform:translateY(60px)}100%{opacity:1;transform:translateY(0)}}
        .level-card{position:relative;display:block;width:280px;padding:0;border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease;border:4px solid rgba(255,255,255,.2);text-decoration:none;color:inherit;user-select:none}
        .level-card:hover{transform:translateY(-12px) scale(1.03)}
        .level-card:active{transform:translateY(-4px) scale(.98)}
        .card-elementary{background:linear-gradient(135deg,#00B06A,#00C853,#69F0AE);box-shadow:0 8px 0 #00894E,0 12px 30px rgba(0,176,106,.4)}
        .card-elementary:hover{box-shadow:0 12px 0 #00894E,0 20px 40px rgba(0,176,106,.6)}
        .card-middle{background:linear-gradient(135deg,#00A2FF,#2196F3,#82B1FF);box-shadow:0 8px 0 #0077C2,0 12px 30px rgba(0,162,255,.4)}
        .card-middle:hover{box-shadow:0 12px 0 #0077C2,0 20px 40px rgba(0,162,255,.6)}
        .card-header{padding:24px 24px 16px;text-align:center}
        .card-icon{width:72px;height:72px;margin:0 auto 14px;background:rgba(255,255,255,.25);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:36px;border:3px solid rgba(255,255,255,.3);backdrop-filter:blur(4px);box-shadow:0 4px 0 rgba(0,0,0,.1)}
        .card-level{font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
        .card-title{font-family:'Bagel Fat One',cursive;font-size:28px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.15);margin-bottom:8px}
        .card-desc{font-family:'Jua',sans-serif;font-size:14px;color:rgba(255,255,255,.85);line-height:1.6}
        .card-footer{padding:14px 24px;background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;gap:8px}
        .play-btn{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#fff;letter-spacing:1px;display:flex;align-items:center;gap:8px}
        .play-arrow{width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:14px solid #fff;filter:drop-shadow(0 2px 0 rgba(0,0,0,.2));animation:pulseArrow 1.5s ease-in-out infinite}
        @keyframes pulseArrow{0%,100%{transform:translateX(0);opacity:1}50%{transform:translateX(4px);opacity:.7}}
        .word-count{position:absolute;top:-6px;right:-6px;background:#F5C542;color:#232527;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;padding:6px 14px;border-radius:30px;border:3px solid rgba(0,0,0,.12);box-shadow:0 3px 0 #D4A636;z-index:5}
        .footer-text{position:fixed;bottom:190px;left:0;right:0;text-align:center;z-index:10;font-family:'Jua',sans-serif;font-size:13px;color:rgba(255,255,255,.35);animation:fadeIn 1s 1.5s both}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes sparkFade{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-30px) scale(0)}}
        @media(max-width:640px){.cards-container{gap:18px}.level-card{width:260px}.ground{height:120px}.footer-text{bottom:130px;font-size:11px}.roblox-char{bottom:110px}.tree{bottom:90px!important}}
    </style>
</head>

        function openEmbeddedHTML(b64) {
            var raw = atob(b64);
            var bytes = new Uint8Array(raw.length);
            for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            var blob = new Blob([bytes], {type: 'text/html;charset=utf-8'});
            var url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        (function(){var s=document.getElementById('skyLayer');for(var i=0;i<120;i++){var d=document.createElement('div');d.className='star';var sz=Math.random()<.1?3:(Math.random()<.3?2:1);d.style.width=sz+'px';d.style.height=sz+'px';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*65+'%';d.style.setProperty('--dur',(2+Math.random()*4)+'s');d.style.animationDelay=Math.random()*5+'s';s.appendChild(d)}})();

        (function(){var c=document.getElementById('particles');var letters='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';var emojis=['⭐','✨','🔤','📖','🎯','💡','🏆'];var items=letters.split('').concat(emojis);for(var i=0;i<25;i++){var p=document.createElement('div');p.className='particle';p.textContent=items[Math.floor(Math.random()*items.length)];p.style.left=Math.random()*100+'%';p.style.setProperty('--p-dur',(12+Math.random()*20)+'s');p.style.setProperty('--p-size',(14+Math.random()*18)+'px');p.style.animationDelay=Math.random()*15+'s';p.style.color=['#FFD54F','#82B1FF','#69F0AE','#FF8A80','#B39DDB'][Math.floor(Math.random()*5)];c.appendChild(p)}})();

        // Sparkle
        document.addEventListener('mousemove',function(e){if(Math.random()>.92){var s=document.createElement('div');s.textContent=['✦','✧','⋆','•'][Math.floor(Math.random()*4)];s.style.cssText='position:fixed;left:'+e.clientX+'px;top:'+e.clientY+'px;pointer-events:none;z-index:999;font-size:'+(8+Math.random()*10)+'px;color:'+['#FFD54F','#82B1FF','#69F0AE'][Math.floor(Math.random()*3)]+';animation:sparkFade .8s forwards;';document.body.appendChild(s);setTimeout(function(){s.remove()},800)}});
    </script>
</body>
</html>
